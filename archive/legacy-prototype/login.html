<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - HEUREKA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#0a192f', accent: '#3b82f6', lightbg: '#f8fafc' } } } }
  </script>
</head>
<body class="font-sans text-gray-900 h-screen bg-lightbg overflow-hidden flex flex-col lg:flex-row">
  
  <!-- Left Side: Form -->
  <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 bg-lightbg h-full overflow-y-auto">
    <div class="w-full max-w-md">
      <!-- Icon -->
      <a href="index.html" class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mx-auto mb-8 hover:bg-accent transition-colors">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1v1H9V7zm5 0h1v1h-1V7zm-5 4h1v1H9v-1zm5 0h1v1h-1v-1zm-5 4h1v1H9v-1zm5 0h1v1h-1v-1z"></path></svg>
      </a>
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary mb-2">Bon retour</h1>
        <p class="text-gray-500 text-sm">Connectez-vous pour accéder à vos analyses</p>
      </div>

      <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
        <form class="space-y-6" onsubmit="event.preventDefault(); handleLogin();">
          <div>
            <label class="block text-sm font-medium text-primary mb-2">Email professionnel</label>
            <input type="email" placeholder="nom@entreprise.fr" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all bg-gray-50 focus:bg-white" required>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-sm font-medium text-primary">Mot de passe</label>
              <a href="#" class="text-sm font-medium text-primary hover:text-accent">Oublié ?</a>
            </div>
            <input type="password" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all bg-gray-50 focus:bg-white" required>
          </div>
          <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-lg font-medium hover-lift transition-all">Se connecter</button>
        </form>
<script>
async function handleLogin(){
  const email=document.querySelector('input[type="email"]').value;
  const password=document.querySelector('input[type="password"]').value;
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(res.ok){
      window.location.href='index.html';
    } else {
      alert(data.message||'Erreur de connexion');
    }
  }catch(e){
    alert('Erreur réseau');
  }
}
</script>
      </div>
      
      <p class="mt-8 text-center text-gray-500 text-sm">
        Pas encore de compte ? <a href="register.html" class="font-bold text-primary hover:text-accent">S'inscrire</a>
      </p>
    </div>
  </div>

  <!-- Right Side: Image with Quote -->
  <div class="hidden lg:flex w-1/2 relative bg-gray-900 border-l border-gray-200 h-full">
    <img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80" alt="Architecture" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-overlay">
    <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/40 to-transparent"></div>
    <div class="relative w-full p-16 flex flex-col justify-end">
      <p class="text-3xl font-light text-white mb-6 leading-relaxed">
        "HEUREKA a divisé par 4 le temps passé sur nos études de faisabilité, tout en sécurisant nos hypothèses d'investissement."
      </p>
      <div class="text-white">
        <p class="font-bold text-lg">Directeur Foncier, Groupe National</p>
      </div>
    </div>
  </div>

</body>
</html>
