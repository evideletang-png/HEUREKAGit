kind = "web"
previewPath = "/"
title = "HEUREKA"
version = "1.0.0"
id = "artifacts/heureka"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18608
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/heureka run dev"

[services.env]
PORT = "18608"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/heureka", "run", "build"]
publicDir = "artifacts/heureka/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
