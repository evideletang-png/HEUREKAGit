name: Railway Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy api-server to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify checkout
        run: |
          git rev-parse HEAD
          git status --short
          ls -la

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Show commit being deployed
        run: echo "Deploying commit $GITHUB_SHA"

      - name: Deploy latest code to Railway
        env:
          RAW_RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAW_RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          if [ -n "$RAW_RAILWAY_API_TOKEN" ]; then
            export RAILWAY_API_TOKEN="$RAW_RAILWAY_API_TOKEN"
          fi

          if [ -n "$RAW_RAILWAY_TOKEN" ]; then
            export RAILWAY_TOKEN="$RAW_RAILWAY_TOKEN"
            export RAILWAY_API_TOKEN="${RAILWAY_API_TOKEN:-$RAW_RAILWAY_TOKEN}"
          fi

          if [ -z "${RAILWAY_TOKEN:-}" ] && [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "No Railway token configured. Add RAILWAY_TOKEN or RAILWAY_API_TOKEN in GitHub Actions secrets."
            exit 1
          fi

          railway up --service "@workspace/api-server" --ci
