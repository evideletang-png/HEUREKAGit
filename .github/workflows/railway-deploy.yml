name: Railway Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy api-server to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify checkout
        run: |
          git rev-parse HEAD
          git status --short
          ls -la

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Show commit being deployed
        run: echo "Deploying commit $GITHUB_SHA"

      - name: Deploy latest code to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "@workspace/api-server" --ci
